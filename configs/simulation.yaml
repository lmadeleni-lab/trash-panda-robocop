name: raccoon-guardian-sim
environment: simulation
database_path: data/raccoon_guardian_sim.db
simulation_mode: true
armed_default: true
selected_strategy: LIGHT_SOUND
target_strategy_preferences:
  raccoon: LIGHT_SOUND
  unknown: LIGHT_ONLY
logging:
  level: DEBUG
  file_enabled: true
  file_path: data/logs/trash-panda-robocop-sim.log
  request_logging_enabled: true
security:
  api_key_enabled: false
  api_key:
  allow_unsafe_local_without_key: true
  trusted_network_required: false
  trusted_client_cidrs:
    - 127.0.0.1/32
    - ::1/128
notifications:
  slack_enabled: false
  slack_webhook_url:
  deliver_morning_summary: false
  escalation_enabled: false
  escalation_failure_threshold: 2
morning_summary:
  enabled: true
  delivery_hour_local: 7
  delivery_minute_local: 30
guard_rounds:
  enabled: true
  interval_minutes: 15
  presets:
    - gate_watch
    - pool_watch
sentry:
  enabled: true
  interval_minutes: 15
  allow_agent_path_selection: true
  regroup_preset: dock
  default_path_id: sim_perimeter
  patrol_paths:
    - path_id: sim_perimeter
      display_name: Sim Perimeter
      area_tags: [gate, backyard]
      waypoints:
        - waypoint_id: sim_gate
          zone_id: gate_entry
          observation_preset: gate_watch
          linear_m_s: 0.12
          angular_rad_s: 0.0
          move_duration_s: 1.2
          dwell_s: 1.5
          servo_id: 1
          servo_position: 500
        - waypoint_id: sim_pool
          zone_id: backyard_protected
          observation_preset: pool_watch
          linear_m_s: 0.1
          angular_rad_s: 0.2
          move_duration_s: 1.5
          dwell_s: 2.0
          servo_id: 1
          servo_position: 620
fleet:
  enabled: true
  local_bot_id: bot-alpha
  coordination_enabled: true
  regroup_enabled: true
  max_bots_per_zone_observation: 2
  prohibit_live_target_convergence: true
  resources:
    low_battery_threshold_percent: 35
    critical_battery_threshold_percent: 15
    low_water_threshold_percent: 30
    critical_water_threshold_percent: 10
    min_battery_for_patrol_percent: 20
    min_water_for_deterrence_percent: 15
  bots:
    - bot_id: bot-alpha
      display_name: Trash Panda Alpha
      assigned_areas: [gate_entry]
      home_path_id: sim_perimeter
      active: true
    - bot_id: bot-bravo
      display_name: Trash Panda Bravo
      assigned_areas: [backyard_protected]
      home_path_id: sim_perimeter
      active: true
recovery:
  enabled: true
  wheel_slip_timeout_s: 8
  max_recovery_attempts: 3
  reverse_duration_s: 1.0
  turn_duration_s: 1.0
  notify_on_recovery: true
runtime:
  background_scheduler_enabled: false
  scheduler_poll_interval_s: 15
agents:
  enabled: true
  run_interval_minutes: 30
  auto_strategy_selection: false
  max_recent_outcomes: 50
perception:
  detector_backend: frame_difference
  min_confidence: 0.35
  capture_dir: data/captures-sim
  save_debug_frames: true
  max_saved_frames: 250
  camera_source: 0
safety:
  timezone: America/New_York
  armed_hours_start: "18:00:00"
  armed_hours_end: "08:00:00"
  cooldown_s: 15
  max_water_duration_s: 1.2
  max_sound_duration_s: 0.8
  max_pan_degrees: 20
  manual_disable: false
  allow_test_actuation: true
zones:
  - zone_id: gate_entry
    display_name: Gate Entry Zone
    deterrence_enabled: true
    polygon:
      - [0.08, 0.35]
      - [0.34, 0.35]
      - [0.34, 0.92]
      - [0.08, 0.92]
  - zone_id: backyard_protected
    display_name: Backyard Protected Zone
    deterrence_enabled: true
    polygon:
      - [0.35, 0.20]
      - [0.96, 0.20]
      - [0.96, 0.98]
      - [0.35, 0.98]
