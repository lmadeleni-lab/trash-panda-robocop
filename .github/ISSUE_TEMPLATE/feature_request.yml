name: Feature Request
description: Propose a new capability or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator need does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the desired behavior and any safety implications.
    validations:
      required: true
  - type: textarea
    id: simulation
    attributes:
      label: Simulation plan
      description: How should this be tested without real hardware?
    validations:
      required: true

